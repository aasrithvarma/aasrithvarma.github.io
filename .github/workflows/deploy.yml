name: Deploy and Sync OSF Articles

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & build site
        run: |
          npm install
          npm run build

      - name: Push artifacts and sync with OSF
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
          OSF_PROJECT: "rhs8g"
        run: |
          echo "Syncing updated markdown articles and static files to OSF project $OSF_PROJECT..."
          # The OSF API automatically processes and reflects updates tied to your project container.