name: Automated Zenodo DOI & Build

on:
  push:
    paths:
      - 'content/articles/**'

jobs:
  sync-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install gray-matter

      - name: Run Zenodo DOI Automation
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: node scripts/automate-zenodo.js

      - name: Build Static Site
        run: npm run build

      - name: Commit and Push Assigned DOIs & Build Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/articles/ docs/
          git commit -m "chore: automatically assign Zenodo DOI and rebuild site" || echo "No changes to commit"
          git push