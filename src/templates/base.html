<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- Calendly -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
</head>
<body>
    <header class="univ-header">
        <div class="container header-container">
            <div class="header-titles">
                <a href="/" class="faculty-name">Dr. Tanmai Aasrith Varma Ayenampudi</a>
                <span class="faculty-title">Physician &amp; Aspiring Pediatric Cardiac Surgeon</span>
            </div>
            
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">Menu</button>
            
            <nav class="univ-nav" id="navMenu">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/biography/">Biography</a></li>
                    <li><a href="/cv/">CV</a></li>
                    <li><a href="/clinical-experience/">Clinical</a></li>
                    <li><a href="/now/">Now</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container site-main"><article class="document-content">{{content}}</article></main>

    <footer class="univ-footer">
        <div class="container">
            <nav class="footer-links">
                <a href="/education/">Education</a>
                <a href="/contact/">Contact &amp; Profiles</a>
            </nav>
            <p>&copy; 2026 Dr. Tanmai Aasrith Varma Ayenampudi. All rights reserved.</p>
        </div>
    </footer>

    <!-- Calendly Scripts -->
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
    <script type="text/javascript">
        window.addEventListener('load', function() {
            Calendly.initBadgeWidget({ 
                url: 'https://calendly.com/dr-avie/10', 
                text: 'Schedule time with me', 
                color: '#8c1515', 
                textColor: '#ffffff', 
                branding: true 
            });
        });
    </script>

    <script>
        const toggle = document.getElementById('navToggle');
        const menu = document.getElementById('navMenu');
        toggle.addEventListener('click', () => {
            menu.classList.toggle('active');
            toggle.textContent = menu.classList.contains('active') ? 'Close' : 'Menu';
        });
    </script>
</body>
</html>
